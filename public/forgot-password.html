<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: Arial, sans-serif;
    }

    .card {
      border-radius: 16px;
      border: none;
    }

    .btn-primary {
      background-color: #667eea;
      border: none;
    }

    .btn-primary:hover {
      background-color: #5a67d8;
    }

    a {
      text-decoration: none;
    }

    .small-link {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg">
          <div class="card-body p-4">
            <h3 class="text-center mb-4">Forgot Password</h3>

            <div class="mb-3">
              <label class="form-label">Enter your registered email</label>
              <input
                type="email"
                id="email"
                class="form-control"
                placeholder="Enter your email"
              />
            </div>

            <button class="btn btn-primary w-100" onclick="sendResetLink()">
              Send Reset Link
            </button>

            <p id="message" class="text-center mt-3 mb-0 small"></p>

            <div class="text-center mt-3">
              <a href="login.html" class="small-link">← Back to Login</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    async function sendResetLink() {
      const email = document.getElementById('email').value.trim();
      const message = document.getElementById('message');

      if (!email) {
        message.className = 'text-center mt-3 mb-0 small text-danger';
        message.innerText = 'Please enter your email';
        return;
      }

      try {
        message.className = 'text-center mt-3 mb-0 small text-warning';
        message.innerText = 'Creating reset request...';

        const res = await axios.post('/password/forgotpassword', { email });

        message.className = 'text-center mt-3 mb-0 small text-success';
        message.innerText = res.data.message || 'Reset link created successfully';

        if (res.data.resetLink) {
          console.log('Reset Link:', res.data.resetLink);
        }
      } catch (err) {
        console.error(err);

        message.className = 'text-center mt-3 mb-0 small text-danger';
        message.innerText =
          err.response?.data?.error || 'Failed to create reset request';
      }
    }
  </script>
</body>
</html>
