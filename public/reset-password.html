<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="login-page">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-4">
            <h3 class="text-center mb-4">Forgot Password</h3>

            <div class="mb-3">
              <label class="form-label">Enter your email</label>
              <input type="email" id="email" class="form-control" />
            </div>

            <button class="btn btn-primary w-100" onclick="sendResetLink()">
              Send Reset Link
            </button>

            <p id="message" class="text-center mt-3 mb-0 small"></p>

            <div class="text-center mt-3">
              <a href="login.html">Back to Login</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    async function sendResetLink() {
      try {
        const email = document.getElementById('email').value;

        const res = await axios.post('/password/forgotpassword', { email });

        const msg = document.getElementById('message');
        msg.className = 'text-center mt-3 mb-0 small text-success';
        msg.innerText = res.data.message;
      } catch (err) {
        const msg = document.getElementById('message');
        msg.className = 'text-center mt-3 mb-0 small text-danger';
        msg.innerText = err.response?.data?.error || 'Failed to send reset link';
      }
    }
  </script>
</body>
</html>
