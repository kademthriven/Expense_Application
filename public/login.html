<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Expense Tracker</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-page">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-4">
            <h2 class="text-center mb-4">Expense Tracker</h2>

            <ul class="nav nav-pills nav-fill mb-4" id="authTabs">
              <li class="nav-item">
                <button class="nav-link active" type="button" onclick="showLogin()">Login</button>
              </li>
              <li class="nav-item">
                <button class="nav-link" type="button" onclick="showSignup()">Signup</button>
              </li>
            </ul>

            <div id="loginSection">
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="loginEmail" class="form-control" />
              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="loginPassword" class="form-control" />
              </div>

              <button class="btn btn-primary w-100" onclick="login()">Login</button>
            </div>

            <div id="signupSection" class="d-none">
              <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" id="signupName" class="form-control" />
              </div>

              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="signupEmail" class="form-control" />
              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="signupPassword" class="form-control" />
              </div>

              <button class="btn btn-success w-100" onclick="signup()">Create Account</button>
            </div>

            <p id="authMessage" class="text-center mt-3 mb-0 small text-danger"></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    function setActiveTab(index) {
      const buttons = document.querySelectorAll('#authTabs .nav-link');
      buttons.forEach((btn, i) => {
        btn.classList.toggle('active', i === index);
      });
    }

    function showLogin() {
      document.getElementById('loginSection').classList.remove('d-none');
      document.getElementById('signupSection').classList.add('d-none');
      document.getElementById('authMessage').innerText = '';
      setActiveTab(0);
    }

    function showSignup() {
      document.getElementById('signupSection').classList.remove('d-none');
      document.getElementById('loginSection').classList.add('d-none');
      document.getElementById('authMessage').innerText = '';
      setActiveTab(1);
    }

    async function signup() {
      try {
        await axios.post('/users/signup', {
          name: document.getElementById('signupName').value,
          email: document.getElementById('signupEmail').value,
          password: document.getElementById('signupPassword').value
        });

        document.getElementById('authMessage').className = 'text-center mt-3 mb-0 small text-success';
        document.getElementById('authMessage').innerText = 'Signup successful. Please login.';
        showLogin();
      } catch (err) {
        document.getElementById('authMessage').className = 'text-center mt-3 mb-0 small text-danger';
        document.getElementById('authMessage').innerText =
          err.response?.data?.error || 'Signup failed';
      }
    }

    async function login() {
      try {
        const res = await axios.post('/users/login', {
          email: document.getElementById('loginEmail').value,
          password: document.getElementById('loginPassword').value
        });

        localStorage.setItem('token', res.data.token);
        window.location.href = 'index.html';
      } catch (err) {
        document.getElementById('authMessage').className = 'text-center mt-3 mb-0 small text-danger';
        document.getElementById('authMessage').innerText =
          err.response?.data?.error || 'Login failed';
      }
    }
  </script>
</body>
</html>
